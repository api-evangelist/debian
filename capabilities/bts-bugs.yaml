naftiko: 1.0.0-alpha2
info:
  label: Debian Bug Tracking System API — Bugs
  description: 'Debian Bug Tracking System API — Bugs. 3 operations. Lead operation: Bug report (mbox/text/HTML). Self-contained
    Naftiko capability covering one Debian business surface.'
  tags:
  - Debian
  - Bugs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBIAN_API_KEY: DEBIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bts-bugs
    baseUri: https://bugs.debian.org
    description: Debian Bug Tracking System API — Bugs business capability. Self-contained, no shared references.
    resources:
    - name: cgi-bin-bugreport.cgi
      path: /cgi-bin/bugreport.cgi
      operations:
      - name: getbugreport
        method: GET
        description: Bug report (mbox/text/HTML)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bug
          in: query
          type: integer
          required: true
        - name: mbox
          in: query
          type: string
    - name: cgi-bin-pkgreport.cgi
      path: /cgi-bin/pkgreport.cgi
      operations:
      - name: getpackagebugs
        method: GET
        description: List bugs against a package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pkg
          in: query
          type: string
          required: true
    - name: bugId
      path: /{bugId}
      operations:
      - name: getbug
        method: GET
        description: View a bug report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bugId
          in: path
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: bts-bugs-rest
    port: 8080
    description: REST adapter for Debian Bug Tracking System API — Bugs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cgi-bin/bugreport-cgi
      name: cgi-bin-bugreport-cgi
      description: REST surface for cgi-bin-bugreport.cgi.
      operations:
      - method: GET
        name: getbugreport
        description: Bug report (mbox/text/HTML)
        call: bts-bugs.getbugreport
        with:
          bug: rest.bug
          mbox: rest.mbox
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cgi-bin/pkgreport-cgi
      name: cgi-bin-pkgreport-cgi
      description: REST surface for cgi-bin-pkgreport.cgi.
      operations:
      - method: GET
        name: getpackagebugs
        description: List bugs against a package
        call: bts-bugs.getpackagebugs
        with:
          pkg: rest.pkg
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{bugid}
      name: bugid
      description: REST surface for bugId.
      operations:
      - method: GET
        name: getbug
        description: View a bug report
        call: bts-bugs.getbug
        with:
          bugId: rest.bugId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bts-bugs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debian Bug Tracking System API — Bugs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bug-report-mbox-text-html
      description: Bug report (mbox/text/HTML)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bts-bugs.getbugreport
      with:
        bug: tools.bug
        mbox: tools.mbox
      outputParameters:
      - type: object
        mapping: $.
    - name: list-bugs-against-package
      description: List bugs against a package
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bts-bugs.getpackagebugs
      with:
        pkg: tools.pkg
      outputParameters:
      - type: object
        mapping: $.
    - name: view-bug-report
      description: View a bug report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bts-bugs.getbug
      with:
        bugId: tools.bugId
      outputParameters:
      - type: object
        mapping: $.
